name: Deploy Escaner a GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: escanerlicitaciones # <-- Cambia esto: done
  REGION: us-east1
  REPO_NAME: escaner-ti-langgraph-agents
  SERVICE_NAME: langgraph-orchestrator-worker
  
  WORKLOAD_IDENTITY_PROVIDER: projects/1066450737358/locations/global/workloadIdentityPools/github-pool/providers/github-provider # <-- Cambia esto: done
  SERVICE_ACCOUNT: github-actions-sa@escanerlicitaciones.iam.gserviceaccount.com # <-- Cambia esto: done

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Autenticación en Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token' # <-- ESTO ES CLAVE PARA DOCKER
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Autenticación en Docker (Artifact Registry)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build y Push de la imagen Docker
        env:
          IMAGE_TAG: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/worker:${{ github.sha }}
        run: |
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "FULL_IMAGE_NAME=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Desplegar en Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2